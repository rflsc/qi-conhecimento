# Blueprint Render — tier GRATUITO (sem cartão)
# https://render.com/docs/blueprint-spec
#
# NÃO usa Redis nem disco do Render (exigem pagamento).
# Redis: crie grátis em https://upstash.com e preencha REDIS_URL manualmente.
# MongoDB: Atlas M0 grátis.
#
# Deploy: Render → New → Blueprint → selecione ESTE arquivo se pedir,
#         ou prefira "Web Service" manual (seção abaixo na doc).

services:
  - type: web
    name: qi-conhecimento-api
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @qi-conhecimento/api... build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PATH
        value: ./storage
      - key: SEED_ADMIN_ENABLED
        value: "false"
      - key: SEED_KNOWLEDGE_ENABLED
        value: "false"
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: LLM_PROVIDER
        value: anthropic
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: MAX_UPLOAD_SIZE_MB
        value: "150"
      - key: PARSER_SERVICE_TIMEOUT_MS
        value: "120000"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
