name: Keep Alive

# Mantém o serviço Render (free tier) acordado pingando o health endpoint.
# Render free dorme após ~15 min sem tráfego; o ping evita cold starts (~45–90s na consulta RAG).
# A URL pode ser sobrescrita em Settings → Secrets and variables → Actions → Variables (HEALTH_URL).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL || 'https://qi-conhecimento.onrender.com/health' }}
        run: |
          echo "Pinging $HEALTH_URL"
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            --connect-timeout 30 --max-time 120 \
            --retry 3 --retry-delay 10 --retry-all-errors \
            "$HEALTH_URL")
          echo "HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "::error::Health check failed with HTTP $code"
            exit 1
          fi
